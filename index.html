<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>製造管理PRO (3項目抽出)</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
:root { --accent: #2563eb; --bg: #f8fafc; --border: #cbd5e1; }
body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 16px; margin: 0; }
.card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
h2 { color: var(--accent); text-align: center; margin-bottom: 20px; font-size: 20px; }
.input-group { margin-bottom: 12px; }
label { font-size: 13px; color: #64748b; font-weight: 700; display: block; margin-bottom: 4px; }
input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 17px; box-sizing: border-box; background: #fff; color: #1e293b; font-weight: 500; }
.btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 10px; font-size: 17px; font-weight: bold; margin-top: 10px; cursor: pointer; }
#status { text-align: center; color: var(--accent); font-size: 14px; margin-top: 12px; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
    <h2>📦 製造管理PRO</h2>
    
    <div class="input-group">
        <label>品番</label>
        <input type="text" id="part-no" placeholder="品番がここに入ります">
    </div>
    
    <div class="input-group">
        <label>商品名</label>
        <input type="text" id="name" placeholder="商品名がここに入ります">
    </div>
    
    <div class="input-group">
        <label>製造納期</label>
        <input type="text" id="date" placeholder="納期がここに入ります">
    </div>

    <button class="btn" onclick="document.getElementById('fileInput').click()">📷 指示書をスキャン</button>
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="processImage(this)">
    <div id="status"></div>
</div>

<script>
async function processImage(input) {
    const status = document.getElementById('status');
    if (!input.files || !input.files[0]) return;
    status.innerText = "🔍 3項目を抽出中...";

    try {
        const worker = await Tesseract.createWorker();
        await worker.loadLanguage('jpn+eng');
        await worker.initialize('jpn+eng');
        
        // 5とSの読み間違いを防ぐため、品番に使われる文字を重点的に設定
        await worker.setParameters({
            tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz/-：:商品コード品番名納期年月日規格',
        });

        const { data: { text } } = await worker.recognize(input.files[0]);
        await worker.terminate();

        const cleanText = text.replace(/\s+/g, "");
        console.log("解析結果:", cleanText);

        const extract = (keys, pattern) => {
            for (let k of keys) {
                if (cleanText.includes(k)) {
                    const parts = cleanText.split(k);
                    if (parts.length > 1) {
                        const match = parts[1].match(pattern);
                        return match ? match[0] : "";
                    }
                }
            }
            return "";
        };

        // --- 反映処理 ---
        
        // 1. 品番（指示書上の「商品コード」または「品番」を探す）
        let rawPartNo = extract(["商品コード", "品番", "品目コード"], /[A-Z0-9-]{5,}/);
        // 先ほどの「S」補正が必要な場合はここで行います
        document.getElementById('part-no').value = rawPartNo;

        // 2. 製造納期
        document.getElementById('date').value = extract(["製造納期", "納期"], /\d{4}\/\d{2}\/\d{2}/);

        // 3. 商品名（商品名から規格の間を抽出）
        if (cleanText.includes("商品名")) {
            const namePart = cleanText.split("商品名")[1].split("規格")[0];
            document.getElementById('name').value = namePart;
        }

        status.innerText = "✅ 完了しました";
    } catch (e) {
        status.innerText = "❌ エラー：撮り直してください";
    }
}
</script>
</body>
</html>
