<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在庫・棚卸管理アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; padding-bottom: 80px; }
        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="max-w-md mx-auto bg-white min-h-screen shadow-lg p-4">
    <h1 class="text-xl font-bold text-center mb-6 text-blue-600">在庫管理システム</h1>

    <div class="flex border-b mb-6">
        <button onclick="showTab('main')" class="flex-1 py-2 text-sm font-medium border-b-2 border-blue-500">入出庫</button>
        <button onclick="showTab('inventory')" class="flex-1 py-2 text-sm font-medium">棚卸</button>
        <button onclick="showTab('master')" class="flex-1 py-2 text-sm font-medium">マスター/出力</button>
    </div>

    <div id="main" class="tab-content active">
        <h2 class="font-bold mb-2">① スキャン・入力</h2>
        <input type="text" id="scanInput" oninput="processScan(this.value)" placeholder="ここをタップしてテキストスキャン" 
               class="w-full p-4 border-2 border-blue-300 rounded-lg mb-4 text-sm">
        
        <div class="bg-blue-50 p-3 rounded-lg mb-4">
            <p class="text-xs text-gray-500">自動抽出結果:</p>
            <div class="grid grid-cols-2 gap-2 mt-2">
                <input type="text" id="resCode" placeholder="商品コード" class="p-2 border rounded bg-white">
                <input type="text" id="resName" placeholder="商品名" class="p-2 border rounded bg-white">
            </div>
        </div>

        <div class="flex gap-4 mb-4">
            <select id="type" class="p-3 border rounded-lg bg-gray-50 font-bold">
                <option value="入庫">入庫 (+)</option>
                <option value="出庫">出庫 (-)</option>
            </select>
            <input type="number" id="quantity" placeholder="数量" class="flex-1 p-3 border-2 border-green-400 rounded-lg text-lg">
        </div>
        <button onclick="saveTransaction()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-md">記録する</button>
    </div>

    <div id="inventory" class="tab-content">
        <h2 class="font-bold mb-2">棚卸モード</h2>
        <p class="text-xs text-gray-500 mb-4">スキャンして現在の実在庫数を入力してください。</p>
        <input type="text" id="invScan" oninput="processInvScan(this.value)" placeholder="品番をスキャンして検索" 
               class="w-full p-4 border-2 border-purple-300 rounded-lg mb-4">
        <div id="invResult" class="p-4 bg-purple-50 rounded-lg hidden">
            <p id="invTargetName" class="font-bold"></p>
            <div class="flex gap-2 mt-2">
                <input type="number" id="invQty" placeholder="実在庫数" class="flex-1 p-2 border rounded">
                <button onclick="submitInventory()" class="bg-purple-600 text-white px-4 py-2 rounded">確定</button>
            </div>
        </div>
    </div>

    <div id="master" class="tab-content">
        <h2 class="font-bold mb-4">データ出力</h2>
        <button onclick="exportCSV()" class="w-full bg-green-600 text-white py-3 rounded mb-6 font-bold">Excel用CSVを出力 (全データ)</button>
        
        <h2 class="font-bold mb-2">登録済みマスター</h2>
        <div id="masterList" class="text-sm space-y-2 max-h-60 overflow-y-auto border-t pt-2">
            </div>
    </div>
</div>

<script>
    let masterData = JSON.parse(localStorage.getItem('stockMaster')) || {};
    let stockLogs = JSON.parse(localStorage.getItem('stockLogs')) || [];

    // iPhoneのテキストスキャンから「コード」と「品名」を抽出するロジック
    function processScan(val) {
        if (!val) return;
        // 英数字（コード）と日本語（品名）を簡易的に分ける
        const codeMatch = val.match(/[A-Za-z0-9-]{3,}/); // 3文字以上の英数字
        const nameMatch = val.match(/[ぁ-んァ-ヶー一-龠]{2,}/); // 2文字以上の日本語

        if (codeMatch) document.getElementById('resCode').value = codeMatch[0];
        if (nameMatch) document.getElementById('resName').value = nameMatch[0];
        
        // 入力欄をクリア（スキャンしやすくするため）
        setTimeout(() => document.getElementById('scanInput').value = '', 1000);
    }

    function saveTransaction() {
        const code = document.getElementById('resCode').value;
        const name = document.getElementById('resName').value;
        const qty = parseInt(document.getElementById('quantity').value);
        const type = document.getElementById('type').value;

        if (!code || isNaN(qty)) return alert('コードと数量を確認してください');

        // マスター保存
        masterData[code] = name;
        localStorage.setItem('stockMaster', JSON.stringify(masterData));

        // ログ保存
        const log = { date: new Date().toLocaleString(), code, name, type, qty };
        stockLogs.push(log);
        localStorage.setItem('stockLogs', JSON.stringify(stockLogs));

        alert(`${type}完了: ${name}`);
        document.getElementById('quantity').value = '';
        renderMaster();
    }

    function processInvScan(val) {
        const code = val.match(/[A-Za-z0-9-]{3,}/);
        if (code && masterData[code[0]]) {
            document.getElementById('invResult').classList.remove('hidden');
            document.getElementById('invTargetName').innerText = `${code[0]} : ${masterData[code[0]]}`;
            document.getElementById('invTargetName').dataset.code = code[0];
        }
    }

    function submitInventory() {
        const code = document.getElementById('invTargetName').dataset.code;
        const qty = document.getElementById('invQty').value;
        const log = { date: new Date().toLocaleString(), code, name: masterData[code], type: '棚卸', qty };
        stockLogs.push(log);
        localStorage.setItem('stockLogs', JSON.stringify(stockLogs));
        alert('棚卸記録を保存しました');
        document.getElementById('invScan').value = '';
        document.getElementById('invResult').classList.add('hidden');
    }

    function exportCSV() {
        let csvContent = "\uFEFF日付,品番,品名,種別,数量\n";
        stockLogs.forEach(log => {
            csvContent += `${log.date},${log.code},${log.name},${log.type},${log.qty}\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "inventory_data.csv");
        link.click();
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('button').forEach(b => b.classList.remove('border-blue-500', 'border-b-2'));
        event.currentTarget.classList.add('border-blue-500', 'border-b-2');
        if(tabId === 'master') renderMaster();
    }

    function renderMaster() {
        const list = document.getElementById('masterList');
        list.innerHTML = '';
        for (let code in masterData) {
            list.innerHTML += `<div class="p-2 bg-gray-50 border-b flex justify-between">
                <span><b>${code}</b>: ${masterData[code]}</span>
            </div>`;
        }
    }
</script>
</body>
</html>
