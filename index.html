<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>製造管理PRO (OCRスキャン)</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
:root { --accent: #2563eb; --bg: #f8fafc; --border: #cbd5e1; }
body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 16px; margin: 0; }
.card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
h2 { color: var(--accent); text-align: center; margin-bottom: 20px; font-size: 20px; }
.input-group { margin-bottom: 12px; }
label { font-size: 12px; color: #64748b; font-weight: 700; display: block; margin-bottom: 4px; }
input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #fff; }
input:focus { outline: none; border-color: var(--accent); background: #f0f7ff; }
.btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 10px; font-size: 17px; font-weight: bold; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn:active { opacity: 0.8; transform: scale(0.98); }
#status { text-align: center; color: var(--accent); font-size: 14px; margin-top: 12px; min-height: 1.2em; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
    <h2>📦 製造管理PRO</h2>
    
    <div class="input-group">
        <label>製造指示番号</label>
        <input type="text" id="id" placeholder="未入力">
    </div>
    <div class="input-group">
        <label>商品コード</label>
        <input type="text" id="code" placeholder="未入力">
    </div>
    <div class="input-group">
        <label>商品名</label>
        <input type="text" id="name" placeholder="未入力">
    </div>
    <div class="input-group">
        <label>数量</label>
        <input type="text" id="qty" placeholder="未入力">
    </div>
    <div class="input-group">
        <label>製造納期</label>
        <input type="text" id="date" placeholder="未入力">
    </div>

    <button class="btn" onclick="document.getElementById('fileInput').click()">
        <span>📷 指示書をスキャン</span>
    </button>
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="processImage(this)">
    <div id="status"></div>
</div>

<script>
async function processImage(input) {
    const status = document.getElementById('status');
    if (!input.files || !input.files[0]) return;

    status.innerText = "🔍 解析中... (約10秒)";
    
    try {
        const result = await Tesseract.recognize(input.files[0], 'jpn+eng');
        const text = result.data.text.replace(/\s+/g, ""); // スペースを削除
        console.log("読み取り全文:", text);

        // 抽出用関数
        const extractValue = (keywords, pattern) => {
            for (let k of keywords) {
                if (text.includes(k)) {
                    const afterText = text.split(k)[1];
                    const match = afterText.match(pattern);
                    return match ? match[0] : "";
                }
            }
            return "";
        };

        // 各項目への反映
        // 指示番号: アルファベットと数字の混在
        document.getElementById('id').value = extractValue(["製造指示番号", "製造指図番号"], /[A-Z0-9]+/);
        
        // 商品コード: アルファベット、数字、ハイフンの混在
        document.getElementById('code').value = extractValue(["商品コード", "品目コード"], /[A-Z0-9-]+/);
        
        // 商品名: 漢字・かなを含む（次のラベルが来るまでを抽出）
        const namePart = text.includes("商品名") ? text.split("商品名")[1].split("規格")[0] : "";
        document.getElementById('name').value = namePart;

        // 数量: 数字のみ
        document.getElementById('qty').value = extractValue(["数量", "数"], /\d+/);
        
        // 納期: 日付形式 (YYYY/MM/DD)
        document.getElementById('date').value = extractValue(["製造納期", "納期"], /\d{4}\/\d{2}\/\d{2}/);

        status.innerText = "✅ 読み取り完了！";
    } catch (e) {
        status.innerText = "❌ エラー: もう一度撮ってください";
        console.error(e);
    }
}
</script>
</body>
</html>
